<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Tips | Growth Expert</title>
    <style>
        :root {
            --gold: #FFD700;
            --dark-gold: #b8860b;
            --instagram: #E1306C;
            --whatsapp: #25D366;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #111;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #222;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: white;
        }

        .btn-gold { background: var(--gold); color: black; }
        .btn-gold:hover { background: var(--dark-gold); transform: translateY(-2px); }

        #output {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
            border-left: 4px solid var(--gold);
            min-height: 40px;
        }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; }

        .btn-ig { background: var(--instagram); text-decoration: none; display: block; padding: 12px; border-radius: 10px; font-weight: bold; color: white; }
        .btn-wa { background: var(--whatsapp); text-decoration: none; display: block; padding: 12px; border-radius: 10px; font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Golden Tips</h1>
        <p class="subtitle">Elevate Your Social Media Game</p>
        
        <input type="text" id="username" placeholder="Type Username Here">
        
        <div class="grid-buttons">
            <button class="btn-gold" onclick="getTip()">🏆 Growth Tip</button>
            <button class="btn-gold" onclick="getIdeas()">💡 Content Ideas</button>
            <button class="btn-gold" onclick="getHashtags()">#️ Best Hashtags</button>
            <button class="btn-gold" onclick="getTip()">🔥 Viral Secrets</button>
        </div>

        <div id="output">Result will appear here...</div>

        <button style="background:#333; width:100%; margin-bottom: 20px;" onclick="copyToClipboard()">📋 Copy Text</button>

        <div class="action-buttons">
            <a href="https://www.instagram.com/omvvvar____x7?igsh=MThsczB4bHVrYzVzZw==" class="btn-ig" target="_blank">
                Follow Me on Instagram 📸
            </a>

            <a href="https://wa.me/212649595538" class="btn-wa" target="_blank">
                Contact for Business 💬
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
