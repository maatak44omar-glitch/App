<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Tips | Growth Panel</title>
    <style>
        :root {
            --gold: #FFD700;
            --bg: #050505;
            --card: #121212;
            --whatsapp: #25D366;
            --insta: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--gold); margin-bottom: 5px; font-size: 32px; }
        .tag { color: #888; font-size: 14px; }

        .choice-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .option-card {
            background: var(--card);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .option-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .option-card h2 { margin-top: 0; font-size: 22px; color: #fff; }
        .option-card p { color: #aaa; font-size: 14px; line-height: 1.6; }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-free { background: var(--gold); color: #000; }
        .btn-paid { background: #fff; color: #000; }
        
        #tip-output {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 10px;
            font-size: 13px;
            color: var(--gold);
            display: none;
        }

        .social-box {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .link-ig { background: var(--insta); color: #fff; flex: 1; }
        .link-wa { background: var(--whatsapp); color: #fff; flex: 1; }

    </style>
</head>
<body>

    <div class="header">
        <h1>✨ Golden Tips</h1>
        <p class="tag">اختر المسار المناسب لك لتطوير حسابك</p>
    </div>

    <div class="choice-container">
        <div class="option-card">
            <h2>🎁 متابعين بالمجان</h2>
            <p>تعلم كيفاش تطور المحتوى ديالك وتجيب متابعين حقيقيين بوحدك عبر نصائح ذهبية.</p>
            <button class="btn btn-free" onclick="showFreeTips()">أريد نصائح التطوير 📈</button>
            <div id="tip-output"></div>
            <a href="https://www.instagram.com/omvvvar____x7?igsh=MThsczB4bHVrYzVzZw==" class="btn" style="background:#333; color:#fff;">للمزيد من المعلومات (Instagram) 📸</a>
        </div>

        <div class="option-card">
            <h2>💰 متابعين بالمال</h2>
            <p>لزيادة المتابعين الحقيقيين وبسرعة، تواصل معي مباشرة عبر الروابط أسفله.</p>
            <div class="social-box">
                <a href="https://www.instagram.com/omvvvar____x7?igsh=MThsczB4bHVrYzVzZw==" class="btn link-ig" target="_blank">Instagram 📸</a>
                <a href="https://wa.me/212649595538?text=أريد%20شراء%20متابعين%20حقيقيين" class="btn link-wa" target="_blank">WhatsApp 💬</a>
            </div>
        </div>
    </div>

    <script>
        function showFreeTips() {
            const tips = [
                "✨ استعمل 'The 3-Second Hook' في فيديوهاتك لجذب الانتباه.",
                "✨ انشر في أوقات الذروة التي يتفاعل فيها متابعوك.",
                "✨ رد على كل التعليقات في الساعة الأولى لزيادة الانتشار.",
                "✨ استعمل كلمات مفتاحية (SEO) في وصف الفيديو."
            ];
            const randomTip = tips[Math.floor(Math.random() * tips.length)];
            const output = document.getElementById('tip-output');
            output.style.display = 'block';
            output.innerText = randomTip;
        }
    </script>
</body>
</html>
